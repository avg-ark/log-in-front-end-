<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lamp Login Page</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="container">
        <div class="lamp"></div>
        <div class="light"></div>

        <div class="login-box">
            <h2>Login</h2>

            <form>
                <input type="email" placeholder="Enter Gmail" required />
                <input type="password" placeholder="Enter Password" required />
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
